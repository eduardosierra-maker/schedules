<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Schedules — Flexo · Concentra · Puebla</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
.wrap{--bg:#1C1C27;--surface:#25253A;--card:#2E2E45;--border:#3A3A55;--text:#E2E2F0;--muted:#8888AA;background:var(--bg);min-height:100vh;transition:background .3s,color .3s;color:var(--text);}
.wrap.slate{--bg:#5B6E8A;--surface:#6B7E9A;--card:#7A8DAA;--border:#8FA3BB;--text:#F0F4F8;--muted:#D0DCE8;}
body{margin:0;font-family:'DM Sans',sans-serif;font-weight:300;}
@media print{.no-print{display:none!important;}.wrap{background:#fff!important;color:#000!important;}.wrap .surface{background:#f5f5f5!important;}}
header{position:relative;padding:2rem 2rem 1.5rem;border-bottom:1px solid var(--border);background:var(--surface);transition:background .3s;}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#7B2FBE,#1565C0,#1B5E20,transparent);}
.eyebrow{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;}
h1{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:800;line-height:1;background:linear-gradient(135deg,#C084FC,#60A5FA,#4ADE80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header-meta{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;margin-top:.4rem;}
.week-badge{font-family:'DM Mono',monospace;font-size:.75rem;padding:.3rem .8rem;background:var(--card);border:1px solid var(--border);border-radius:999px;color:var(--text);transition:all .3s;}
.week-badge span{color:#C084FC;font-weight:500}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:.5rem;flex-wrap:wrap;padding:.6rem 2rem;background:var(--surface);border-bottom:1px solid var(--border);transition:background .3s;}
.topbar-left{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap;}
.topbar-right{display:flex;gap:.4rem;align-items:center;}
.airtable-btn{display:inline-flex;align-items:center;gap:.4rem;font-family:'DM Mono',monospace;font-size:.68rem;padding:.35rem .9rem;border-radius:6px;background:linear-gradient(135deg,#7B2FBE,#1565C0);color:#fff;text-decoration:none;transition:opacity .2s;}
.airtable-btn:hover{opacity:.85;}
.btn{font-family:'DM Mono',monospace;font-size:.68rem;padding:.35rem .8rem;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn:hover{opacity:.8;}
.search-wrap{position:relative;}
.search-wrap input{font-family:'DM Sans',sans-serif;font-size:.75rem;padding:.3rem .7rem .3rem 1.8rem;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);width:160px;outline:none;transition:all .3s;}
.search-icon{position:absolute;left:.55rem;top:50%;transform:translateY(-50%);font-size:12px;color:var(--muted);}
.now-badge{font-family:'DM Mono',monospace;font-size:.68rem;padding:.3rem .7rem;border-radius:999px;background:#FFD70022;border:1px solid #FFD70055;color:#FFD700;}
.tabs{display:flex;padding:0 2rem;background:var(--surface);border-bottom:1px solid var(--border);transition:background .3s;}
.tab{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;padding:.85rem 1.2rem;border:none;background:transparent;color:var(--text);opacity:.4;cursor:pointer;position:relative;transition:color .2s,opacity .2s;font-weight:500;}
.tab::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:transparent;transition:background .2s;}
.tab.active{opacity:1;}
.tab[data-site="Flexo"].active{color:#C084FC}.tab[data-site="Flexo"].active::after{background:#7B2FBE}
.tab[data-site="Concentra"].active{color:#60A5FA}.tab[data-site="Concentra"].active::after{background:#1565C0}
.tab[data-site="Puebla"].active{color:#4ADE80}.tab[data-site="Puebla"].active::after{background:#1B5E20}
main{padding:1.5rem 2rem;background:var(--bg);transition:background .3s;}
.panel{display:none;animation:fadeUp .3s ease;}
.panel.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.cob-bar{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;padding:.6rem 1rem;border-radius:10px;background:var(--card);margin-bottom:.8rem;border:1px solid var(--border);transition:background .3s;}
.cob-label{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.cob-tag{font-family:'DM Mono',monospace;font-size:.68rem;padding:.22rem .7rem;border-radius:999px;}
.copy-btn{font-family:'DM Mono',monospace;font-size:.62rem;padding:.2rem .6rem;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;margin-left:.2rem;}
.copy-btn:hover{color:var(--text);}
.stats{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.8rem;}
.stat{font-family:'DM Mono',monospace;font-size:.65rem;padding:.35rem .7rem;border-radius:6px;background:var(--card);border:1px solid var(--border);color:var(--muted);}
.stat strong{display:block;font-size:.9rem;color:var(--text);margin-bottom:1px;}
.schedule-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.15);}
table{border-collapse:collapse;min-width:900px;width:100%;}
thead tr th{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.07em;text-transform:uppercase;padding:.5rem .3rem;text-align:center;border:1px solid var(--border);white-space:nowrap;color:#fff;}
th.now-col{box-shadow:inset 0 0 0 2px #FFD700;}
.th-name{text-align:left;padding-left:1rem;min-width:200px;font-family:'Syne',sans-serif;font-size:.75rem;}
.group-header td{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:.35rem 1rem;color:#fff;}
tbody tr{transition:filter .15s;}tbody tr:hover td{filter:brightness(1.08);}
tbody tr.hidden-row{display:none;}
td{padding:.3rem;text-align:center;font-size:.7rem;border:1px solid rgba(0,0,0,.07);height:38px;}
td.now-col{box-shadow:inset 0 0 0 1px rgba(255,215,0,.35);}
.td-name{text-align:left;padding-left:.6rem;font-family:'DM Sans',sans-serif;font-weight:500;font-size:.85rem;white-space:nowrap;}
.avatar-cell{display:flex;align-items:center;gap:8px;}
.av{width:28px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;color:#fff;font-family:'DM Mono',monospace;overflow:hidden;}
.av img{width:100%;height:100%;object-fit:cover;border-radius:4px;}
.cell-break,.cell-lunch{font-family:'DM Mono',monospace;font-size:.62rem;font-weight:600;color:#fff;}
.site-flexo thead tr th{background:#7B2FBE;}.site-flexo .group-header td{background:#9B4DCA;}
.site-flexo .row-g0 td{background:#E8D5F5}.site-flexo .row-g1 td{background:#D8BDF0}.site-flexo .row-g2 td{background:#C9A8EA}
.site-flexo .row-g0 td.cell-break,.site-flexo .row-g1 td.cell-break,.site-flexo .row-g2 td.cell-break{background:#4A0072;color:#fff;}
.site-flexo .row-g0 td.cell-lunch,.site-flexo .row-g1 td.cell-lunch,.site-flexo .row-g2 td.cell-lunch{background:#1B5E20;color:#fff;}
.site-concentra thead tr th{background:#1565C0;}.site-concentra .group-header td{background:#1976D2;}
.site-concentra .row-g0 td{background:#BBDEFB}.site-concentra .row-g1 td{background:#90CAF9}.site-concentra .row-g2 td{background:#B3D9F7}
.site-concentra .row-g0 td.cell-break,.site-concentra .row-g1 td.cell-break,.site-concentra .row-g2 td.cell-break{background:#0D3A7A;color:#fff;}
.site-concentra .row-g0 td.cell-lunch,.site-concentra .row-g1 td.cell-lunch,.site-concentra .row-g2 td.cell-lunch{background:#1B5E20;color:#fff;}
.site-puebla thead tr th{background:#1B5E20;}.site-puebla .group-header td{background:#2E7D32;}
.site-puebla .row-g0 td{background:#C8E6C9}.site-puebla .row-g1 td{background:#A5D6A7}.site-puebla .row-g2 td{background:#B2DFDB}
.site-puebla .row-g0 td.cell-break,.site-puebla .row-g1 td.cell-break,.site-puebla .row-g2 td.cell-break{background:#0a3d12;color:#fff;}
.site-puebla .row-g0 td.cell-lunch,.site-puebla .row-g1 td.cell-lunch,.site-puebla .row-g2 td.cell-lunch{background:#1B5E20;color:#fff;}
footer{padding:.7rem 2rem;font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);border-top:1px solid var(--border);background:var(--surface);transition:background .3s;}
@media(max-width:600px){
  header{padding:1.2rem 1rem 1rem;}
  .topbar{padding:.5rem 1rem;}
  .tabs{padding:0 .5rem;}
  main{padding:1rem;}
  .search-wrap input{width:120px;}
  .schedule-wrap{border-radius:8px;}
  .th-name{min-width:130px;}
  .av{width:22px;height:22px;}
  .td-name{font-size:.75rem;}
}
</style>
</head>
<body>
<div class="wrap" id="wrap">
<header>
  <span class="eyebrow">Sistema de Horarios — Telesales</span>
  <h1>Schedules</h1>
  <div class="header-meta">
    <span class="week-badge">Semana: <span>Week 19</span></span>
    <span class="week-badge">del 4 al 9 de Mayo</span>
  </div>
</header>
<div class="topbar no-print">
  <div class="topbar-left">
    <a href="https://airtable.com/appnUxot5wb7aHIq5/pagbiENTFl1teaE3Q" target="_blank" class="airtable-btn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Subir horarios
    </a>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Buscar persona..." oninput="filterNames()"/>
    </div>
    <span class="now-badge" id="now-badge" style="display:none"></span>
  </div>
  <div class="topbar-right">
    <button class="btn" onclick="document.getElementById('wrap').classList.toggle('slate')">🌑 Dark / 🩶 Slate</button>
    <button class="btn" onclick="window.print()">🖨️ Imprimir</button>
  </div>
</div>
<div class="tabs no-print">
  <button class="tab active" data-site="Flexo">Flexo</button>
  <button class="tab" data-site="Concentra">Concentra</button>
  <button class="tab" data-site="Puebla">Puebla</button>
</div>
<main>
  <div class="panel active" id="panel-Flexo"></div>
  <div class="panel" id="panel-Concentra"></div>
  <div class="panel" id="panel-Puebla"></div>
</main>
<footer>Cualquier duda o cambio consulta a tu coordinador.</footer>
</div>
<script>
const HORAS=["9:00","10:00","11:00","11:15","11:30","11:45","12:00","13:00","14:00","15:00","16:00","16:15","16:30","17:00","17:45","18:00","19:00"];
const LABELS=["── Lunch 13:00 ──","── Lunch 14:00 ──","── Lunch 15:00 ──"];
const COLORS={Flexo:'#7B2FBE',Concentra:'#1565C0',Puebla:'#1B5E20'};
const LIGHTS={Flexo:'#F3E5FF',Concentra:'#E3F2FD',Puebla:'#E8F5E9'};
const AV_COLORS={Flexo:['#7B2FBE','#9B4DCA','#6A35A8'],Concentra:['#1565C0','#1976D2','#0D47A1'],Puebla:['#1B5E20','#2E7D32','#388E3C']};
const AVATAR_BASE="https://eduardosierra-maker.github.io/schedules/";
const SCHEDULE={"Flexo": {"week": "Week 19", "fecha": "del 4 al 9 de Mayo", "people": [{"name": "Gerardo Almanza", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Ana Morales", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Jaqui Mendoza", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Erick Duran", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Alexa Hernandez", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Ana Pale", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Axel Palomarez", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}], "cobertura": ["Gerardo Almanza"]}, "Concentra": {"week": "Week 19", "fecha": "del 4 al 9 de Mayo", "people": [{"name": "Hugo Iker", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Jose Quirino", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Fernando Evaristo", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Zuleima Salazar", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Adan Valencia", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Arturo Barcenas", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Luis Perez", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Carlos Monroy", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "José Ojeda", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Gustavo Huesca", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Bernardo Cruz", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Mariel Salazar", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Gabriela Arguello", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Marina Tomas", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Manuel Ramirez", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Brenda Paniagua", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Ana Ibarra", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Brayan Castillo", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}], "cobertura": ["Hugo Iker", "Jose Quirino", "Fernando Evaristo"]}, "Puebla": {"week": "Week 19", "fecha": "del 4 al 9 de Mayo", "people": [{"name": "Claudia Rodriguez", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Jaime Hernandez", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Claudia Mejia", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Julio Aparicio", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "David Roldan", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Mafer Martinez", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Alejandra Galindo", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Luz Gonzalez", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}], "cobertura": ["Claudia Rodriguez"]}};

function initials(name){const p=name.trim().split(' ');return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():name.slice(0,2).toUpperCase();}

function avatarHTML(name,site,group){
  const avColor=AV_COLORS[site][group%3];
  const ini=initials(name);
  const exts=['png','jpeg','jpg'];
  const urls=exts.map(e=>AVATAR_BASE+encodeURIComponent(name)+'.'+e);
  return `<div class="av" style="background:${avColor}" id="av-${name.replace(/\s/g,'_')}">
    <img src="${urls[0]}" alt="${ini}"
      onerror="this.parentElement.innerHTML='${ini}'"
      style="width:100%;height:100%;object-fit:cover;border-radius:4px;"/>
  </div>`;
}

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+tab.dataset.site).classList.add('active');
  });
});

function filterNames(){
  const q=document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('tr[data-name]').forEach(row=>{
    row.classList.toggle('hidden-row',q.length>0&&!row.dataset.name.includes(q));
  });
}

function copyNames(names,btn){
  navigator.clipboard.writeText(names).then(()=>{
    btn.textContent='✅ Copiado';
    setTimeout(()=>btn.textContent='📋 Copiar',2000);
  });
}

function markCurrentHour(){
  const now=new Date();
  const mins=now.getHours()*60+now.getMinutes();
  const hStr=now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes();
  let closestIdx=-1,minDiff=999;
  HORAS.forEach((h,i)=>{
    const [hh,mm]=h.split(':').map(Number);
    const d=Math.abs(hh*60+mm-mins);
    if(d<minDiff&&d<31){minDiff=d;closestIdx=i;}
  });
  if(closestIdx>=0){
    const colNum=closestIdx+2;
    document.querySelectorAll(`thead tr th:nth-child(${colNum})`).forEach(el=>el.classList.add('now-col'));
    document.querySelectorAll(`tbody tr td:nth-child(${colNum})`).forEach(el=>el.classList.add('now-col'));
    const badge=document.getElementById('now-badge');
    badge.textContent='🕐 '+hStr;
    badge.style.display='inline-flex';
  }
}

function renderSite(site){
  const {people,cobertura}=SCHEDULE[site];
  const sc='site-'+site.toLowerCase();
  const counts=[0,0,0];
  people.forEach(p=>counts[p.group]++);
  let html='';
  if(cobertura&&cobertura.length>0){
    const names=cobertura.join(', ');
    html+=`<div class="cob-bar"><span class="cob-label">Cobertura Sábado</span>`;
    cobertura.forEach(n=>{html+=`<span class="cob-tag" style="border:1px solid ${COLORS[site]};color:${COLORS[site]};background:${LIGHTS[site]}">${n}</span>`;});
    html+=`<button class="copy-btn" onclick="copyNames('${names}',this)">📋 Copiar</button></div>`;
  }
  html+=`<div class="stats">`;
  ['13:00','14:00','15:00'].forEach((h,i)=>{
    html+=`<div class="stat"><strong>${counts[i]}</strong>Lunch ${h}</div>`;
  });
  html+=`<div class="stat"><strong>${people.length}</strong>Total</div></div>`;
  html+=`<div class="schedule-wrap"><table class="${sc}"><thead><tr><th class="th-name">${site}</th>`;
  HORAS.forEach(h=>{html+=`<th>${h}</th>`;});
  html+=`</tr></thead><tbody>`;
  let lastGroup=-1;
  people.forEach(p=>{
    const {name,group,b1,lu,b2}=p;
    if(group!==lastGroup){lastGroup=group;html+=`<tr class="group-header"><td colspan="${HORAS.length+1}">${LABELS[group]}</td></tr>`;}
    html+=`<tr class="row-g${group}" data-name="${name.toLowerCase()}"><td class="td-name"><div class="avatar-cell">${avatarHTML(name,site,group)}<span>${name}</span></div></td>`;
    HORAS.forEach(h=>{
      if(h===b1||h===b2) html+=`<td class="cell-break">Break</td>`;
      else if(h===lu)    html+=`<td class="cell-lunch">Lunch</td>`;
      else               html+=`<td></td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;
  document.getElementById('panel-'+site).innerHTML=html;
}
['Flexo','Concentra','Puebla'].forEach(renderSite);
markCurrentHour();
</script>
</body>
</html>
