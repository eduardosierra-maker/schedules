<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Schedules — Flexo · Concentra · Puebla</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1C1C27;--surface:#25253A;--card:#2E2E45;--border:#3A3A55;--text:#E2E2F0;--muted:#8888AA;}
.slate{--bg:#5B6E8A;--surface:#6B7E9A;--card:#7A8DAA;--border:#8FA3BB;--text:#F0F4F8;--muted:#D0DCE8;}
body{margin:0;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;transition:background .3s,color .3s;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media print{.no-print{display:none!important;}}
.header{position:relative;padding:2rem 2rem 1.5rem;background:var(--surface);border-bottom:1px solid var(--border);animation:fadeDown .5s ease;overflow:hidden;transition:background .3s;}
.hglow{position:absolute;top:-40px;left:-5%;width:50%;height:160%;background:radial-gradient(ellipse,rgba(123,47,190,.2) 0%,transparent 70%);pointer-events:none;}
.hglow2{position:absolute;top:-40px;right:-5%;width:45%;height:160%;background:radial-gradient(ellipse,rgba(21,101,192,.15) 0%,transparent 70%);pointer-events:none;}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#7B2FBE,#1565C0,#1B5E20,transparent);}
.eyebrow{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;}
h1{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:800;line-height:1;background:linear-gradient(135deg,#C084FC,#60A5FA,#4ADE80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.meta{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;margin-top:.5rem;}
.badge{font-family:'DM Mono',monospace;font-size:.72rem;padding:.25rem .7rem;background:var(--card);border:1px solid var(--border);border-radius:999px;color:var(--text);transition:all .3s;}
.badge span{color:#C084FC;font-weight:500}
.now-badge{background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.3);color:#FFD700;animation:pulse 2s infinite;}
.status-bar{display:flex;gap:.4rem;flex-wrap:wrap;padding:.5rem 1.5rem;background:var(--surface);border-bottom:1px solid var(--border);align-items:center;transition:background .3s;}
.sl{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;}
.chip{display:inline-flex;align-items:center;gap:.3rem;font-family:'DM Mono',monospace;font-size:.65rem;padding:.18rem .55rem;border-radius:999px;border:1px solid var(--border);background:var(--card);color:var(--text);}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dot-b{background:#FFD700;animation:pulse 1.5s infinite;}
.dot-l{background:#4ADE80;animation:pulse 1.5s infinite;}
.dot-w{background:#60A5FA;}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:.5rem;flex-wrap:wrap;padding:.6rem 2rem;background:var(--surface);border-bottom:1px solid var(--border);transition:background .3s;}
.tl{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap;}
.tr{display:flex;gap:.4rem;align-items:center;}
.abt{display:inline-flex;align-items:center;gap:.4rem;font-family:'DM Mono',monospace;font-size:.68rem;padding:.35rem .9rem;border-radius:6px;background:linear-gradient(135deg,#7B2FBE,#1565C0);color:#fff;text-decoration:none;}
.btn{font-family:'DM Mono',monospace;font-size:.68rem;padding:.32rem .75rem;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;transition:all .2s;}
.sw{position:relative;}
.sw input{font-family:'DM Sans',sans-serif;font-size:.75rem;padding:.28rem .7rem .28rem 1.75rem;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);width:155px;outline:none;transition:all .3s;}
.si{position:absolute;left:.52rem;top:50%;transform:translateY(-50%);font-size:12px;color:var(--muted);}
.tabs{display:flex;padding:0 2rem;background:var(--surface);border-bottom:1px solid var(--border);transition:background .3s;}
.tab{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;padding:.85rem 1.2rem;border:none;background:transparent;color:var(--text);opacity:.4;cursor:pointer;position:relative;transition:color .2s,opacity .2s;font-weight:500;}
.tab::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:transparent;transition:background .2s;}
.tab.active{opacity:1;}
.tab[data-site="Flexo"].active{color:#C084FC}.tab[data-site="Flexo"].active::after{background:#7B2FBE}
.tab[data-site="Concentra"].active{color:#60A5FA}.tab[data-site="Concentra"].active::after{background:#1565C0}
.tab[data-site="Puebla"].active{color:#4ADE80}.tab[data-site="Puebla"].active::after{background:#1B5E20}
main{padding:1.5rem 2rem;background:var(--bg);transition:background .3s;}
.panel{display:none;animation:fadeUp .3s ease;}
.panel.active{display:block;}
.stats-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.8rem;}
.stat{flex:1;min-width:65px;padding:.38rem .65rem;border-radius:7px;background:var(--card);border:1px solid var(--border);}
.stat strong{display:block;font-size:.95rem;font-weight:700;color:var(--text);}
.stat small{font-size:.62rem;color:var(--muted);}
.cob-bar{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;padding:.55rem .9rem;border-radius:10px;background:var(--card);margin-bottom:.8rem;border:1px solid var(--border);transition:background .3s;}
.cob-label{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.cob-tag{font-family:'DM Mono',monospace;font-size:.68rem;padding:.2rem .65rem;border-radius:999px;}
.schedule-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.15);}
table{border-collapse:collapse;min-width:900px;width:100%;}
thead tr th{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.07em;text-transform:uppercase;padding:.5rem .3rem;text-align:center;border:1px solid var(--border);white-space:nowrap;color:#fff;}
th.now-col{outline:2px solid #FFD700;outline-offset:-2px;}
.th-name{text-align:left;padding-left:1rem;min-width:200px;font-family:'Syne',sans-serif;font-size:.75rem;}
.group-header td{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:.35rem 1rem;color:#fff;}
tbody tr{transition:filter .15s;}tbody tr:hover td{filter:brightness(1.08);}
tbody tr.hidden-row{display:none;}
td{padding:.3rem;text-align:center;font-size:.7rem;border:1px solid rgba(0,0,0,.07);height:38px;}
td.now-col{outline:1px solid rgba(255,215,0,.3);outline-offset:-1px;}
.td-name{text-align:left;padding-left:.6rem;font-family:'DM Sans',sans-serif;font-weight:500;font-size:.85rem;white-space:nowrap;}
.avatar-cell{display:flex;align-items:center;gap:8px;}
.av{width:28px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;color:#fff;font-family:'DM Mono',monospace;overflow:hidden;}
.av img{width:100%;height:100%;object-fit:cover;border-radius:4px;}
.cell-break,.cell-lunch{font-family:'DM Mono',monospace;font-size:.62rem;font-weight:600;color:#fff;}
.site-flexo thead tr th{background:#7B2FBE;}.site-flexo .group-header td{background:#9B4DCA;}
.site-flexo .row-g0 td{background:#E8D5F5;color:#2d1b4e}.site-flexo .row-g1 td{background:#D8BDF0;color:#2d1b4e}.site-flexo .row-g2 td{background:#C9A8EA;color:#2d1b4e}
.site-flexo .row-g0 td.cell-break,.site-flexo .row-g1 td.cell-break,.site-flexo .row-g2 td.cell-break{background:#4A0072;color:#fff;}
.site-flexo .row-g0 td.cell-lunch,.site-flexo .row-g1 td.cell-lunch,.site-flexo .row-g2 td.cell-lunch{background:#1B5E20;color:#fff;}
.site-concentra thead tr th{background:#1565C0;}.site-concentra .group-header td{background:#1976D2;}
.site-concentra .row-g0 td{background:#BBDEFB;color:#0a1628}.site-concentra .row-g1 td{background:#90CAF9;color:#0a1628}.site-concentra .row-g2 td{background:#B3D9F7;color:#0a1628}
.site-concentra .row-g0 td.cell-break,.site-concentra .row-g1 td.cell-break,.site-concentra .row-g2 td.cell-break{background:#0D3A7A;color:#fff;}
.site-concentra .row-g0 td.cell-lunch,.site-concentra .row-g1 td.cell-lunch,.site-concentra .row-g2 td.cell-lunch{background:#1B5E20;color:#fff;}
.site-puebla thead tr th{background:#1B5E20;}.site-puebla .group-header td{background:#2E7D32;}
.site-puebla .row-g0 td{background:#C8E6C9;color:#0a1f0a}.site-puebla .row-g1 td{background:#A5D6A7;color:#0a1f0a}.site-puebla .row-g2 td{background:#B2DFDB;color:#0a1f0a}
.site-puebla .row-g0 td.cell-break,.site-puebla .row-g1 td.cell-break,.site-puebla .row-g2 td.cell-break{background:#0a3d12;color:#fff;}
.site-puebla .row-g0 td.cell-lunch,.site-puebla .row-g1 td.cell-lunch,.site-puebla .row-g2 td.cell-lunch{background:#1B5E20;color:#fff;}
.cards{display:none;flex-direction:column;gap:.5rem;}
.person-card{padding:.7rem .9rem;border-radius:8px;background:var(--card);border:1px solid var(--border);}
.pc-name{font-weight:500;font-size:.88rem;margin-bottom:.3rem;color:var(--text);}
.pc-times{display:flex;gap:.3rem;flex-wrap:wrap;}
.pc-chip{font-family:'DM Mono',monospace;font-size:.65rem;padding:.15rem .5rem;border-radius:999px;color:#fff;}
footer{padding:.7rem 2rem;font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);border-top:1px solid var(--border);background:var(--surface);transition:background .3s;}
@media(max-width:600px){
  .schedule-wrap{display:none;}
  .cards{display:flex;}
  header{padding:1.2rem 1rem 1rem;}
  .topbar{padding:.5rem 1rem;}
  .tabs{padding:0 .5rem;}
  main{padding:1rem;}
  .sw input{width:120px;}
}
</style>
</head>
<body>
<header class="header">
  <div class="hglow"></div>
  <div class="hglow2"></div>
  <span class="eyebrow">Sistema de Horarios — Telesales</span>
  <h1>Schedules</h1>
  <div class="meta">
    <span class="badge">Semana: <span>Week 23</span></span>
    <span class="badge">del 1 al 6 de Junio</span>
    <span class="badge now-badge" id="now-badge" style="display:none"></span>
  </div>
</header>
<div class="status-bar no-print" id="status-bar">
  <span class="sl">Ahora —</span>
</div>
<div class="topbar no-print">
  <div class="tl">
    <a href="https://airtable.com/appnUxot5wb7aHIq5/pagbiENTFl1teaE3Q" target="_blank" class="abt">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Subir horarios
    </a>
    <div class="sw">
      <span class="si">🔍</span>
      <input type="text" id="search" placeholder="Buscar persona..." oninput="filterNames()"/>
    </div>
  </div>
  <div class="tr">
    <button class="btn" onclick="document.body.classList.toggle('slate')">🌑 Dark / 🩶 Slate</button>
    <button class="btn" onclick="window.print()">🖨️ Imprimir</button>
  </div>
</div>
<div class="tabs no-print">
  <button class="tab active" data-site="Flexo">Flexo</button>
  <button class="tab" data-site="Concentra">Concentra</button>
  <button class="tab" data-site="Puebla">Puebla</button>
</div>
<main>
  <div class="panel active" id="panel-Flexo"></div>
  <div class="panel" id="panel-Concentra"></div>
  <div class="panel" id="panel-Puebla"></div>
</main>
<footer>Cualquier duda o cambio consulta a tu coordinador.</footer>
<script>
const HORAS=["9:00","10:00","11:00","11:15","11:30","11:45","12:00","13:00","14:00","15:00","16:00","16:15","16:30","17:00","17:45","18:00","19:00"];
const LABELS=["── Lunch 13:00 ──","── Lunch 14:00 ──","── Lunch 15:00 ──"];
const COLORS={Flexo:'#7B2FBE',Concentra:'#1565C0',Puebla:'#1B5E20'};
const LIGHTS={Flexo:'#F3E5FF',Concentra:'#E3F2FD',Puebla:'#E8F5E9'};
const AV_COLORS={Flexo:['#7B2FBE','#9B4DCA','#6A35A8'],Concentra:['#1565C0','#1976D2','#0D47A1'],Puebla:['#1B5E20','#2E7D32','#388E3C']};
const BREAK_COLORS={Flexo:'#4A0072',Concentra:'#0D3A7A',Puebla:'#0a3d12'};
const AVATAR_BASE="https://eduardosierra-maker.github.io/schedules/";
const SCHEDULE={"Flexo": {"week": "Week 23", "fecha": "del 1 al 6 de Junio", "people": [{"name": "Axel Palomarez", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Fernando Evaristo", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Gabriela Arguello", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Ana Morales", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Ana Pale", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Erick Duran", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Alexa Hernandez", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Gerardo Almanza", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Jaqui Mendoza", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}], "cobertura": ["Axel Palomarez", "Fernando Evaristo"]}, "Concentra": {"week": "Week 23", "fecha": "del 1 al 6 de Junio", "people": [{"name": "Ana Ibarra", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Dulce Camacho", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Adan Valencia", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Hugo Iker", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Marina Tomas", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Gustavo Huesca", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Imelda Hernandez", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Brayan Castillo", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Zuleima Salazar", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Jose Quirino", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Bernardo Cruz", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Mariel Salazar", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Arturo Barcenas", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Brayan Reyes", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "José Ojeda", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Brenda Paniagua", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Jaqui Mendoza", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Yaritza Rojas", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Carlos Monroy", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Manuel Ramirez", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}], "cobertura": ["Ana Ibarra", "Dulce Camacho"]}, "Puebla": {"week": "Week 23", "fecha": "del 1 al 6 de Junio", "people": [{"name": "Claudia Mejia", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "David Roldan", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Claudia Rodriguez", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Jaime Hernandez", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Luz Gonzalez", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Fernanda Bistrain", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Alejandra Galindo", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Julio Aparicio", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}], "cobertura": ["Claudia Mejia"]}};

function initials(name){const p=name.trim().split(' ');return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():name.slice(0,2).toUpperCase();}

function avatarHTML(name,site,group){
  const avColor=AV_COLORS[site][group%3];
  const ini=initials(name);
  const url=AVATAR_BASE+encodeURIComponent(name)+'.png';
  const urlJ=AVATAR_BASE+encodeURIComponent(name)+'.jpeg';
  return `<div class="av" style="background:${avColor}"><img src="${url}" alt="${ini}" onerror="this.src='${urlJ}';this.onerror=function(){this.parentElement.innerHTML='${ini}';}" style="width:100%;height:100%;object-fit:cover;border-radius:4px;"/></div>`;
}

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+tab.dataset.site).classList.add('active');
  });
});

function filterNames(){
  const q=document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('tr[data-name]').forEach(row=>{
    row.classList.toggle('hidden-row',q.length>0&&!row.dataset.name.includes(q));
  });
}

function horaToMins(h){const[hh,mm]=h.split(':').map(Number);return hh*60+mm;}

function markCurrentHour(){
  const now=new Date();
  const mins=now.getHours()*60+now.getMinutes();
  const hStr=now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes();
  let closestIdx=-1,minDiff=999;
  HORAS.forEach((h,i)=>{
    const d=Math.abs(horaToMins(h)-mins);
    if(d<minDiff&&d<31){minDiff=d;closestIdx=i;}
  });
  if(closestIdx>=0){
    const colNum=closestIdx+2;
    document.querySelectorAll(`thead tr th:nth-child(${colNum})`).forEach(el=>el.classList.add('now-col'));
    document.querySelectorAll(`tbody tr td:nth-child(${colNum})`).forEach(el=>el.classList.add('now-col'));
    const nb=document.getElementById('now-badge');
    nb.textContent='🕐 '+hStr;
    nb.style.display='inline-flex';
  }
}

function buildStatusBar(){
  const now=new Date();
  const mins=now.getHours()*60+now.getMinutes();
  const bar=document.getElementById('status-bar');
  const chips=[];
  ['Flexo','Concentra','Puebla'].forEach(site=>{
    const {people}=SCHEDULE[site];
    people.forEach(p=>{
      const {name,b1,lu,b2}=p;
      let status=null;
      if(b1&&Math.abs(horaToMins(b1)-mins)<30)status='Break';
      else if(b2&&Math.abs(horaToMins(b2)-mins)<30)status='Break';
      else if(lu&&Math.abs(horaToMins(lu)-mins)<30)status='Lunch';
      if(status){
        const dot=status==='Break'?'dot-b':'dot-l';
        chips.push(`<span class="chip"><span class="dot ${dot}"></span>${name} · ${status}</span>`);
      }
    });
  });
  if(chips.length===0){
    bar.innerHTML='<span class="sl">Sin actividad en este momento</span>';
  } else {
    bar.innerHTML='<span class="sl">Ahora —</span>'+chips.join('');
  }
}

function renderSite(site){
  const {people,cobertura}=SCHEDULE[site];
  const sc='site-'+site.toLowerCase();
  const counts=[0,0,0];
  people.forEach(p=>counts[p.group]++);
  let html='';
  html+=`<div class="stats-row">`;
  ['13:00','14:00','15:00'].forEach((h,i)=>{html+=`<div class="stat"><strong>${counts[i]}</strong><small>Lunch ${h}</small></div>`;});
  html+=`<div class="stat"><strong>${people.length}</strong><small>Total</small></div></div>`;
  if(cobertura&&cobertura.length>0){
    html+=`<div class="cob-bar"><span class="cob-label">Cobertura Sábado</span>`;
    cobertura.forEach(n=>{html+=`<span class="cob-tag" style="border:1px solid ${COLORS[site]};color:${COLORS[site]};background:${LIGHTS[site]}">${n}</span>`;});
    html+=`</div>`;
  }
  html+=`<div class="schedule-wrap"><table class="${sc}"><thead><tr><th class="th-name">${site}</th>`;
  HORAS.forEach(h=>{html+=`<th>${h}</th>`;});
  html+=`</tr></thead><tbody>`;
  let lastGroup=-1;
  people.forEach(p=>{
    const {name,group,b1,lu,b2}=p;
    if(group!==lastGroup){lastGroup=group;html+=`<tr class="group-header"><td colspan="${HORAS.length+1}">${LABELS[group]}</td></tr>`;}
    html+=`<tr class="row-g${group}" data-name="${name.toLowerCase()}"><td class="td-name"><div class="avatar-cell">${avatarHTML(name,site,group)}<span>${name}</span></div></td>`;
    HORAS.forEach(h=>{
      if(h===b1||h===b2) html+=`<td class="cell-break">Break</td>`;
      else if(h===lu)    html+=`<td class="cell-lunch">Lunch</td>`;
      else               html+=`<td></td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;
  html+=`<div class="cards">`;
  people.forEach(p=>{
    const {name,group,b1,lu,b2}=p;
    const bc=BREAK_COLORS[site];
    html+=`<div class="person-card"><div class="pc-name">${name}</div><div class="pc-times">`;
    if(b1)html+=`<span class="pc-chip" style="background:${bc}">Break ${b1}</span>`;
    if(lu)html+=`<span class="pc-chip" style="background:#1B5E20">Lunch ${lu}</span>`;
    if(b2)html+=`<span class="pc-chip" style="background:${bc}">Break ${b2}</span>`;
    html+=`</div></div>`;
  });
  html+=`</div>`;
  document.getElementById('panel-'+site).innerHTML=html;
}
['Flexo','Concentra','Puebla'].forEach(renderSite);
markCurrentHour();
buildStatusBar();
</script>
</body>
