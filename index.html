<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Schedules — Flexo · Concentra · Puebla</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --flexo:   #6B21A8;
  --flexo-d: #3B0764;
  --flexo-l: #F3E8FF;
  --flexo-m: #9333EA;
  --conc:    #0D4C8B;
  --conc-d:  #062E54;
  --conc-l:  #DBEAFE;
  --conc-m:  #1E6AB5;
  --puebla:  #1A5C3A;
  --puebla-d:#0D3320;
  --puebla-l:#D1FAE5;
  --puebla-m:#228B55;
  --bg:      #0A0A0F;
  --surface: #12121A;
  --border:  #1E1E2E;
  --text:    #E8E8F0;
  --muted:   #6B6B80;
  --break:   rgba(255,255,255,0.15);
  --lunch-g: #15803D;
}

html{scroll-behavior:smooth}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-weight:300;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── NOISE OVERLAY ─────────────────────────── */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.5;
}

/* ── HEADER ────────────────────────────────── */
header{
  position:relative;
  padding:3rem 2rem 2rem;
  border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:.5rem;
}
header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--flexo),var(--conc),var(--puebla),transparent);
}
.eyebrow{
  font-family:'DM Mono',monospace;
  font-size:.7rem;letter-spacing:.2em;
  color:var(--muted);text-transform:uppercase;
}
h1{
  font-family:'Syne',sans-serif;
  font-size:clamp(2rem,5vw,3.5rem);
  font-weight:800;line-height:1;
  background:linear-gradient(135deg,#C084FC,#60A5FA,#4ADE80);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.header-meta{
  display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
  margin-top:.5rem;
}
.week-badge{
  font-family:'DM Mono',monospace;
  font-size:.8rem;padding:.3rem .8rem;
  background:var(--surface);border:1px solid var(--border);border-radius:999px;
  color:var(--text);
}
#week-label{color:#C084FC;font-weight:500}

/* ── UPLOAD / CONTROLS ─────────────────────── */
.controls{
  display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
  padding:1.5rem 2rem;
  border-bottom:1px solid var(--border);
}
.upload-btn{
  display:inline-flex;align-items:center;gap:.5rem;
  font-family:'DM Mono',monospace;font-size:.75rem;letter-spacing:.05em;
  padding:.6rem 1.2rem;border-radius:6px;cursor:pointer;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);transition:border-color .2s,box-shadow .2s;
}
.upload-btn:hover{border-color:var(--flexo-m);box-shadow:0 0 12px rgba(147,51,234,.2)}
.upload-btn svg{flex-shrink:0}
#file-input{display:none}

.dl-btn{
  display:inline-flex;align-items:center;gap:.5rem;
  font-family:'DM Mono',monospace;font-size:.75rem;letter-spacing:.05em;
  padding:.6rem 1.2rem;border-radius:6px;cursor:pointer;
  background:linear-gradient(135deg,var(--flexo),var(--conc));
  border:none;color:#fff;text-decoration:none;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.dl-btn.visible{opacity:1;pointer-events:auto}

.status{
  font-family:'DM Mono',monospace;font-size:.72rem;
  color:var(--muted);margin-left:auto;
}

/* ── TABS ──────────────────────────────────── */
.tabs{
  display:flex;gap:0;
  border-bottom:1px solid var(--border);
  padding:0 2rem;
}
.tab{
  font-family:'DM Mono',monospace;font-size:.75rem;letter-spacing:.1em;
  text-transform:uppercase;padding:1rem 1.5rem;
  border:none;background:transparent;color:var(--muted);
  cursor:pointer;position:relative;transition:color .2s;
}
.tab::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;
  background:transparent;transition:background .2s;
}
.tab.active{color:var(--text)}
.tab[data-site="Flexo"].active{color:#C084FC}
.tab[data-site="Flexo"].active::after{background:var(--flexo)}
.tab[data-site="Concentra"].active{color:#60A5FA}
.tab[data-site="Concentra"].active::after{background:var(--conc)}
.tab[data-site="Puebla"].active{color:#4ADE80}
.tab[data-site="Puebla"].active::after{background:var(--puebla)}

/* ── MAIN CONTENT ──────────────────────────── */
main{padding:2rem;position:relative;z-index:1}

.panel{display:none}
.panel.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── SCHEDULE TABLE ────────────────────────── */
.schedule-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{border-collapse:collapse;min-width:900px;width:100%}

thead tr th{
  font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.08em;
  text-transform:uppercase;padding:.5rem .4rem;text-align:center;
  border:1px solid rgba(255,255,255,.05);position:sticky;top:0;z-index:2;
  white-space:nowrap;
}
.th-name{
  text-align:left;padding-left:1rem;min-width:180px;
  font-family:'Syne',sans-serif;font-size:.8rem;letter-spacing:.02em;
}

/* Grupo separadores */
.group-header td{
  font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;
  text-transform:uppercase;padding:.35rem 1rem;text-align:left;
  border-top:1px solid rgba(255,255,255,.08);
}

tbody tr{transition:background .15s}
tbody tr:hover td{filter:brightness(1.1)}

td{
  padding:.4rem;text-align:center;
  font-size:.75rem;border:1px solid rgba(255,255,255,.04);
  height:36px;
}
.td-name{
  text-align:left;padding-left:1rem;
  font-family:'DM Sans',sans-serif;font-weight:500;font-size:.85rem;
  white-space:nowrap;letter-spacing:.01em;
}

.cell-break{
  background:rgba(255,255,255,.12);color:rgba(255,255,255,.7);
  font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;
  font-weight:500;
}
.cell-lunch-g{
  background:var(--lunch-g);color:#fff;
  font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;
  font-weight:500;
}
.cell-lunch-b{
  background:var(--conc);color:#fff;
  font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;
  font-weight:500;
}
.cell-work{background:transparent}

/* Flexo rows */
.site-flexo   .td-name{color:#E9D5FF}
.site-flexo   .row-g0 td{background:rgba(107,33,168,.08)}
.site-flexo   .row-g1 td{background:rgba(107,33,168,.14)}
.site-flexo   .row-g2 td{background:rgba(107,33,168,.20)}
.site-flexo   thead tr th{background:#1A0933;color:#C084FC}
.site-flexo   .group-header td{background:rgba(107,33,168,.3);color:#E9D5FF}

/* Concentra rows */
.site-concentra .td-name{color:#BFDBFE}
.site-concentra .row-g0 td{background:rgba(13,76,139,.08)}
.site-concentra .row-g1 td{background:rgba(13,76,139,.14)}
.site-concentra .row-g2 td{background:rgba(13,76,139,.20)}
.site-concentra thead tr th{background:#06192E;color:#60A5FA}
.site-concentra .group-header td{background:rgba(13,76,139,.3);color:#BFDBFE}

/* Puebla rows */
.site-puebla   .td-name{color:#A7F3D0}
.site-puebla   .row-g0 td{background:rgba(26,92,58,.08)}
.site-puebla   .row-g1 td{background:rgba(26,92,58,.14)}
.site-puebla   .row-g2 td{background:rgba(26,92,58,.20)}
.site-puebla   thead tr th{background:#071A10;color:#4ADE80}
.site-puebla   .group-header td{background:rgba(26,92,58,.3);color:#A7F3D0}

/* ── COBERTURA ─────────────────────────────── */
.cobertura{
  margin-top:2rem;padding:1.5rem;
  border:1px solid var(--border);border-radius:10px;
  background:var(--surface);
}
.cobertura h3{
  font-family:'Syne',sans-serif;font-size:1rem;
  margin-bottom:1rem;opacity:.6;
}
.cob-list{display:flex;flex-wrap:wrap;gap:.5rem}
.cob-chip{
  font-family:'DM Mono',monospace;font-size:.72rem;
  padding:.3rem .8rem;border-radius:999px;
  border:1px solid;opacity:.9;
}

/* ── EMPTY STATE ───────────────────────────── */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1rem;padding:6rem 2rem;text-align:center;
}
.empty-icon{font-size:3rem;opacity:.3}
.empty p{color:var(--muted);font-size:.9rem;max-width:340px;line-height:1.6}
.empty strong{color:var(--text)}

/* ── LEGEND ────────────────────────────────── */
.legend{
  display:flex;gap:1.5rem;flex-wrap:wrap;
  padding:1rem 2rem;border-top:1px solid var(--border);
  font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted);
}
.leg-item{display:flex;align-items:center;gap:.4rem}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
</style>
</head>
<body>

<header>
  <span class="eyebrow">Sistema de Horarios</span>
  <h1>Schedules</h1>
  <div class="header-meta">
    <span class="week-badge">Semana: <span id="week-label">—</span></span>
    <span class="week-badge" id="date-label" style="display:none"></span>
  </div>
</header>

<div class="controls">
  <label class="upload-btn" for="file-input">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Cargar Excel (.xlsx)
  </label>
  <input type="file" id="file-input" accept=".xlsx,.xls"/>

  <a id="dl-btn" class="dl-btn" download="Schedules_Pycharm.xlsx">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Descargar Excel
  </a>

  <span class="status" id="status">Carga tu archivo Excel para ver los horarios</span>
</div>

<div class="tabs">
  <button class="tab active" data-site="Flexo">Flexo</button>
  <button class="tab" data-site="Concentra">Concentra</button>
  <button class="tab" data-site="Puebla">Puebla</button>
</div>

<main>
  <div class="panel active" id="panel-Flexo"></div>
  <div class="panel" id="panel-Concentra"></div>
  <div class="panel" id="panel-Puebla"></div>
</main>

<div class="legend">
  <span class="leg-item"><span class="leg-dot" style="background:rgba(255,255,255,.2)"></span>Break</span>
  <span class="leg-item"><span class="leg-dot" style="background:#15803D"></span>Lunch (Grupo A)</span>
  <span class="leg-item"><span class="leg-dot" style="background:#0D4C8B"></span>Lunch (Grupo B/C)</span>
  <span class="leg-item"><span class="leg-dot" style="background:transparent;border:1px solid #444"></span>Working</span>
</div>

<script>
const HORAS = ["9:00","10:00","11:00","11:15","11:30","11:45","12:00","13:00","14:00","15:00","16:00","16:15","16:30","17:00","17:45","18:00","19:00"];
const SITES = ["Flexo","Concentra","Puebla"];
const SKIP  = new Set(["free spot","free slot","no coach","new sup","new here","no coverage","n/a","none",""]);

let fileBlob = null;

// Tabs
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+tab.dataset.site).classList.add('active');
  });
});

// File input
document.getElementById('file-input').addEventListener('change', e=>{
  const f = e.target.files[0];
  if(!f) return;
  fileBlob = f;
  const dlBtn = document.getElementById('dl-btn');
  dlBtn.href = URL.createObjectURL(f);
  dlBtn.classList.add('visible');
  const reader = new FileReader();
  reader.onload = ev => parseExcel(ev.target.result, f.name);
  reader.readAsArrayBuffer(f);
});

function norm(s){
  return String(s||'').trim()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^\w\s]/g,'')
    .replace(/\s+/g,' ').trim().toLowerCase();
}

function parseWeek(v){
  const m = String(v||'').match(/(\d{1,2})/);
  if(m){const n=parseInt(m[1]); if(n>=1&&n<=53) return n;}
  return null;
}

function parseExcel(buffer, fname){
  try{
    const wb = XLSX.read(buffer, {type:'array'});
    document.getElementById('status').textContent = '✓ '+fname;

    // Try to read week from Roster sheet
    let weekNum = null;
    let weekStr = '—';
    if(wb.SheetNames.includes('Roster')){
      const ws = wb.Sheets['Roster'];
      const data = XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      // Find latest week with data in col J (index 9)
      for(let r=3;r<data.length;r++){
        const w = parseWeek(data[r][9]);
        if(w && (!weekNum || w>weekNum)) weekNum=w;
      }
    }
    if(weekNum) weekStr = 'Week '+String(weekNum).padStart(2,'0');
    document.getElementById('week-label').textContent = weekStr;

    // Render each site
    SITES.forEach(site => renderSite(wb, site, weekNum));
  }catch(err){
    document.getElementById('status').textContent = '❌ Error al leer el archivo';
    console.error(err);
  }
}

const ROSTER_COLS = {
  Flexo:    {col_week:9,col_fecha:10,col_sup:11,col_coach:12,col_extra:13,col_sup_list:1,col_coach_list:5,sup_rows:[3,19],coach_rows:[3,19]},
  Concentra:{col_week:15,col_fecha:16,col_sup:17,col_coach:18,col_extra:19,col_sup_list:2,col_coach_list:6,sup_rows:[3,19],coach_rows:[3,19]},
  Puebla:   {col_week:21,col_fecha:22,col_sup:23,col_coach:24,col_extra:25,col_sup_list:3,col_coach_list:7,sup_rows:[3,19],coach_rows:[3,19]},
};

function readCol(data, col, r0, r1){
  const out=[];
  for(let r=r0;r<=r1&&r<data.length;r++){
    const v=String(data[r][col]||'').trim();
    if(v && !SKIP.has(norm(v))) out.push(v);
  }
  return out;
}

function renderSite(wb, site, weekNum){
  const panel = document.getElementById('panel-'+site);
  const cfg = ROSTER_COLS[site];

  // Try to read from the site's own sheet first
  let names=[], cobertura=[], fecha='';

  if(wb.SheetNames.includes(site)){
    const ws = wb.Sheets[site];
    const data = XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    // Row 1 (index 1) has Week, Row 3 (index 3) has hour headers → names start row 4 (index 4)
    for(let r=4;r<data.length;r++){
      const v=String(data[r][1]||'').trim().replace(/^\s+/,'');
      if(v && !SKIP.has(norm(v)) && !v.startsWith('──') && !v.startsWith('Cobertura')) names.push(v);
    }
  }

  // Read from Roster sheet for cobertura & names fallback
  if(wb.SheetNames.includes('Roster')){
    const ws = wb.Sheets['Roster'];
    const data = XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    if(names.length===0){
      names = readCol(data,cfg.col_sup_list,...cfg.sup_rows)
             .concat(readCol(data,cfg.col_coach_list,...cfg.coach_rows));
    }
    // Find cobertura for this week
    for(let r=3;r<data.length;r++){
      const wn=parseWeek(data[r][cfg.col_week]);
      if(wn && weekNum && wn===weekNum){
        fecha=String(data[r][cfg.col_fecha]||'').trim();
        [cfg.col_sup,cfg.col_coach,cfg.col_extra].forEach(c=>{
          const v=String(data[r][c]||'').trim();
          if(v && !SKIP.has(norm(v))) cobertura.push(v);
        });
        break;
      }
    }
  }

  if(names.length===0){
    panel.innerHTML = emptyState(site);
    return;
  }

  // Assign groups
  const total=names.length;
  const g1=Math.max(1,Math.round(total*.25));
  const g2=Math.floor((total-g1)/2);
  const g3=total-g1-g2;
  const groups=[
    {range:Array.from({length:g1},(_,i)=>i),       break1:"11:15",lunch:"13:00",break2:"16:30",label:"── Lunch 13:00 ──"},
    {range:Array.from({length:g2},(_,i)=>i+g1),     break1:"11:30",lunch:"14:00",break2:"17:00",label:"── Lunch 14:00 ──"},
    {range:Array.from({length:g3},(_,i)=>i+g1+g2),  break1:"11:45",lunch:"15:00",break2:"17:45",label:"── Lunch 15:00 ──"},
  ];

  const siteClass='site-'+site.toLowerCase();
  let html=`<div class="schedule-wrap"><table class="${siteClass}"><thead><tr>`;
  html+=`<th class="th-name">${site}</th>`;
  HORAS.forEach(h=>`<th>${h}</th>`).forEach(t=>html+=t);
  html+=`</tr></thead><tbody>`;

  groups.forEach((grp,gi)=>{
    if(grp.range.length===0) return;
    html+=`<tr class="group-header"><td colspan="${HORAS.length+1}">${grp.label}</td></tr>`;
    grp.range.forEach(rowI=>{
      const name=names[rowI];
      html+=`<tr class="row-g${gi}"><td class="td-name">${name}</td>`;
      HORAS.forEach(h=>{
        if(h===grp.break1||h===grp.break2){
          html+=`<td class="cell-break">BRK</td>`;
        }else if(h===grp.lunch){
          const cls=gi===0?'cell-lunch-g':'cell-lunch-b';
          html+=`<td class="${cls}">LCH</td>`;
        }else{
          html+=`<td class="cell-work"></td>`;
        }
      });
      html+=`</tr>`;
    });
  });

  html+=`</tbody></table></div>`;

  if(cobertura.length>0){
    const colors={Flexo:'#6B21A8',Concentra:'#0D4C8B',Puebla:'#1A5C3A'};
    const light={Flexo:'#F3E8FF',Concentra:'#DBEAFE',Puebla:'#D1FAE5'};
    html+=`<div class="cobertura"><h3>Cobertura Sábado${fecha?' — '+fecha:''}</h3><div class="cob-list">`;
    cobertura.forEach(n=>{
      html+=`<span class="cob-chip" style="border-color:${colors[site]};color:${light[site]};background:${colors[site]}22">${n}</span>`;
    });
    html+=`</div></div>`;
  }

  panel.innerHTML=html;
}

function emptyState(site){
  return `<div class="empty">
    <div class="empty-icon">📋</div>
    <p>No se encontraron datos para <strong>${site}</strong> en el Excel cargado.</p>
  </div>`;
}

// Default empty panels
SITES.forEach(site=>{
  document.getElementById('panel-'+site).innerHTML=`<div class="empty">
    <div class="empty-icon">📂</div>
    <p>Carga tu archivo <strong>Schedules Pycharm.xlsx</strong> usando el botón de arriba para visualizar los horarios.</p>
  </div>`;
});
</script>
</body>
</html>
