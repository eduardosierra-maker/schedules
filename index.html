<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Schedules — Flexo · Concentra · Puebla</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0D0D0D;color:#E2E2F0;font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
header{padding:2rem 2rem 1.5rem;border-bottom:1px solid #222;display:flex;flex-direction:column;gap:.4rem;background:#0D0D0D;}
.eyebrow{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.2em;color:#555;text-transform:uppercase;}
h1{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:800;color:#A855F7;}
.header-meta{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-top:.4rem;}
.week-badge{font-family:'DM Mono',monospace;font-size:.8rem;padding:.3rem .9rem;background:#1A1A1A;border:1px solid #333;border-radius:999px;color:#aaa;}
.week-badge span{color:#C084FC;font-weight:700}
.topbar{display:flex;justify-content:flex-end;padding:.7rem 2rem;background:#111;border-bottom:1px solid #222;}
.airtable-btn{display:inline-flex;align-items:center;gap:.5rem;font-family:'DM Mono',monospace;font-size:.75rem;padding:.5rem 1.2rem;border-radius:6px;background:linear-gradient(135deg,#7C3AED,#0E7490);color:#fff;text-decoration:none;transition:opacity .2s;}
.airtable-btn:hover{opacity:.8;}
.tabs{display:flex;border-bottom:1px solid #222;padding:0 2rem;background:#111;}
.tab{font-family:'DM Mono',monospace;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;padding:.9rem 1.5rem;border:none;background:transparent;color:#FFFFFF;cursor:pointer;position:relative;transition:color .2s;}
.tab::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:transparent;transition:background .2s;}
.tab[data-site="Flexo"].active{color:#60A5FA}.tab[data-site="Flexo"].active::after{background:#A855F7}
.tab[data-site="Concentra"].active{color:#C084FC}.tab[data-site="Concentra"].active::after{background:#7030A0}
.tab[data-site="Puebla"].active{color:#FB923C}.tab[data-site="Puebla"].active::after{background:#F97316}
main{padding:2rem;background:#0D0D0D;}
.panel{display:none}.panel.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.schedule-wrap{overflow-x:auto;border-radius:10px;border:1px solid #1E1E1E;}
table{border-collapse:collapse;min-width:900px;width:100%}
thead tr th{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;padding:.6rem .4rem;text-align:center;border:1px solid rgba(255,255,255,.05);position:sticky;top:0;z-index:2;white-space:nowrap;font-weight:600;color:#fff;}
.th-name{text-align:left;padding-left:1.2rem;min-width:190px;font-family:'Syne',sans-serif;font-size:.85rem;}
.group-header td{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:.4rem 1.2rem;text-align:left;font-weight:600;font-style:italic;}
tbody tr{transition:filter .15s}tbody tr:hover td{filter:brightness(1.15)}
td{padding:.35rem .3rem;text-align:center;font-size:.72rem;border:1px solid rgba(255,255,255,.04);height:36px;}
.td-name{text-align:left;padding-left:1.2rem;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.88rem;white-space:nowrap;border-left:3px solid transparent;}
.cell-break{font-family:'DM Mono',monospace;font-size:.65rem;font-weight:700;color:#fff;}
.cell-lunch{font-family:'DM Mono',monospace;font-size:.65rem;font-weight:700;color:#fff;background:#16A34A !important;}

/* FLEXO — morado */
.site-flexo thead tr th{background:#1E3A8A;}
.site-flexo .td-name{color:#1E3A8A;border-left-color:#3B82F6;}
.site-flexo .row-g0 td{background:#DBEAFE;color:#1E3A8A}
.site-flexo .row-g0 .cell-break{background:#1D4ED8}
.site-flexo .row-g1 td{background:#BFDBFE;color:#1E3A8A}
.site-flexo .row-g1 .cell-break{background:#2563EB}
.site-flexo .row-g2 td{background:#A5C8F8;color:#1E3A8A}
.site-flexo .row-g2 .cell-break{background:#3B82F6}
.site-flexo .group-header.gh0 td{background:#93C5FD;color:#1E3A8A;border-top:1px solid #60A5FA;}
.site-flexo .group-header.gh1 td{background:#60A5FA;color:#1E3A8A;border-top:1px solid #3B82F6;}
.site-flexo .group-header.gh2 td{background:#3B82F6;color:#fff;border-top:1px solid #2563EB;}

/* CONCENTRA — cian */
.site-concentra thead tr th{background:#3B0764;}
.site-concentra .td-name{color:#3B0764;border-left-color:#A855F7;}
.site-concentra .row-g0 td{background:#F3E8FF;color:#3B0764}
.site-concentra .row-g0 .cell-break{background:#6D28D9}
.site-concentra .row-g1 td{background:#EDE9FE;color:#4C1D95}
.site-concentra .row-g1 .cell-break{background:#7C3AED}
.site-concentra .row-g2 td{background:#E5D8FB;color:#5B21B6}
.site-concentra .row-g2 .cell-break{background:#8B5CF6}
.site-concentra .group-header.gh0 td{background:#C4B5FD;color:#3B0764;border-top:1px solid #A78BFA;}
.site-concentra .group-header.gh1 td{background:#A78BFA;color:#2E1065;border-top:1px solid #8B5CF6;}
.site-concentra .group-header.gh2 td{background:#8B5CF6;color:#fff;border-top:1px solid #7C3AED;}

/* PUEBLA — naranja */
.site-puebla thead tr th{background:#7C2D12;}
.site-puebla .td-name{color:#7C2D12;border-left-color:#F97316;}
.site-puebla .row-g0 td{background:#FFF7ED;color:#7C2D12}
.site-puebla .row-g0 .cell-break{background:#C2410C}
.site-puebla .row-g1 td{background:#FFEDD5;color:#9A3412}
.site-puebla .row-g1 .cell-break{background:#EA580C}
.site-puebla .row-g2 td{background:#FED7AA;color:#9A3412}
.site-puebla .row-g2 .cell-break{background:#F97316}
.site-puebla .group-header.gh0 td{background:#FED7AA;color:#7C2D12;border-top:1px solid #FDBA74;}
.site-puebla .group-header.gh1 td{background:#FDBA74;color:#7C2D12;border-top:1px solid #FB923C;}
.site-puebla .group-header.gh2 td{background:#FB923C;color:#fff;border-top:1px solid #F97316;}

.cobertura-section{margin-top:1.5rem;border:1px solid #1E1E1E;border-radius:10px;overflow:hidden;}
.cob-header{padding:.7rem 1.2rem;font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;color:#fff;}
.cob-week{padding:.4rem 1.2rem;font-family:'DM Mono',monospace;font-size:.75rem;color:#555;background:#111;border-bottom:1px solid #1E1E1E;}
.cob-names{padding:1rem 1.2rem;display:flex;flex-wrap:wrap;gap:.5rem;background:#0D0D0D;}
.cob-chip{font-family:'DM Mono',monospace;font-size:.78rem;padding:.35rem .9rem;border-radius:999px;border:1px solid;font-weight:600;}
</style>
</head>
<body>
<header>
  <span class="eyebrow">Sistema de Horarios — Telesales</span>
  <h1>Schedules</h1>
  <div class="header-meta">
    <span class="week-badge">Semana: <span>Week 18</span></span>
    <span class="week-badge">27 Apr – 2 May</span>
  </div>
</header>
<div class="topbar">
  <a href="https://airtable.com/appnUxot5wb7aHIq5/pagbiENTFl1teaE3Q" target="_blank" class="airtable-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    Da clic aquí para subir horarios
  </a>
</div>
<div class="tabs">
  <button class="tab active" data-site="Flexo">Flexo</button>
  <button class="tab" data-site="Concentra">Concentra</button>
  <button class="tab" data-site="Puebla">Puebla</button>
</div>
<main>
  <div class="panel active" id="panel-Flexo"></div>
  <div class="panel" id="panel-Concentra"></div>
  <div class="panel" id="panel-Puebla"></div>
</main>
<script>
const HORAS=["9:00","10:00","11:00","11:15","11:30","11:45","12:00","13:00","14:00","15:00","16:00","16:15","16:30","17:00","17:45","18:00","19:00"];
const LABELS=["— Lunch 13:00 —","— Lunch 14:00 —","— Lunch 15:00 —"];
const COB={
  Flexo:{bg:'#1D4ED8',chip:'#3B82F6',light:'#DBEAFE'},
  Concentra:{bg:'#6D28D9',chip:'#A855F7',light:'#EDE9FE'},
  Puebla:{bg:'#C2410C',chip:'#F97316',light:'#FFEDD5'}
};
const SCHEDULE={"Flexo":{"week":"Week 18","people":[{"name":"Erick Duran","group":0,"b1":"11:15","lu":"13:00","b2":"16:30"},{"name":"Gerardo Almanza","group":0,"b1":"11:15","lu":"13:00","b2":"16:30"},{"name":"Axel Palomarez","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Irving Gaucin","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Alexa Hernandez","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Ana Pale","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"},{"name":"Jaqui Mendoza","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"},{"name":"Ana Morales","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"}],"cobertura":[]},"Concentra":{"week":"Week 18","people":[{"name":"Ana Ibarra","group":0,"b1":"11:15","lu":"13:00","b2":"16:30"},{"name":"Zuleima Salazar","group":0,"b1":"11:15","lu":"13:00","b2":"16:30"},{"name":"Fernando Evaristo","group":0,"b1":"11:15","lu":"13:00","b2":"16:30"},{"name":"Mariel Salazar","group":0,"b1":"11:15","lu":"13:00","b2":"16:30"},{"name":"Gabriela Arguello","group":0,"b1":"11:15","lu":"13:00","b2":"16:30"},{"name":"Carla Velazquez","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Marina Tomas","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Brenda Paniagua","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Manuel Ramirez","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Luis Perez","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Jose Quirino","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"José Ojeda","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Adan Valencia","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"},{"name":"Arturo Barcenas","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"},{"name":"Gustavo Huesca","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"},{"name":"Hugo Iker","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"},{"name":"Bernardo Cruz","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"},{"name":"Brayan Castillo","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"},{"name":"Carlos Monroy","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"}],"cobertura":[]},"Puebla":{"week":"Week 18","people":[{"name":"Claudia Mejia","group":0,"b1":"11:15","lu":"13:00","b2":"16:30"},{"name":"David Roldan","group":0,"b1":"11:15","lu":"13:00","b2":"16:30"},{"name":"Luz Gonzalez","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Mafer Martinez","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Alejandra Galindo","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Julio Aparicio","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"},{"name":"Jaime Hernandez","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"},{"name":"Claudia Rodriguez","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"}],"cobertura":[]}};

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+tab.dataset.site).classList.add('active');
  });
});

function renderSite(site){
  const {people,cobertura,week}=SCHEDULE[site];
  const sc='site-'+site.toLowerCase();
  const c=COB[site];
  let html=`<div class="schedule-wrap"><table class="${sc}"><thead><tr><th class="th-name">${site}</th>`;
  HORAS.forEach(h=>{html+=`<th>${h}</th>`;});
  html+=`</tr></thead><tbody>`;
  let lastGroup=-1;
  people.forEach(({name,group,b1,lu,b2})=>{
    if(group!==lastGroup){
      lastGroup=group;
      html+=`<tr class="group-header gh${group}"><td colspan="${HORAS.length+1}">${LABELS[group]}</td></tr>`;
    }
    html+=`<tr class="row-g${group}"><td class="td-name">${name}</td>`;
    HORAS.forEach(h=>{
      if(h===b1||h===b2) html+=`<td class="cell-break">Break</td>`;
      else if(h===lu)    html+=`<td class="cell-lunch">Lunch</td>`;
      else               html+=`<td></td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;
  html+=`<div class="cobertura-section">
    <div class="cob-header" style="background:${c.bg}">Cobertura Sábado</div>
    <div class="cob-week">${week} — 2 de Mayo</div>
    <div class="cob-names">`;
  if(cobertura&&cobertura.length>0){
    cobertura.forEach(n=>{html+=`<span class="cob-chip" style="border-color:${c.chip};color:${c.light};background:${c.chip}22">${n}</span>`;});
  } else {
    html+=`<span style="font-family:'DM Mono',monospace;font-size:.75rem;color:#444">Sin cobertura asignada</span>`;
  }
  html+=`</div></div>`;
  document.getElementById('panel-'+site).innerHTML=html;
}
['Flexo','Concentra','Puebla'].forEach(renderSite);
</script>
</body>
</html>
