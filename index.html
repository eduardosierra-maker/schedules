<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Schedules — Flexo · Concentra · Puebla</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--flexo:#7B2FBE;--conc:#1565C0;--puebla:#1B5E20;--bg:#1C1C27;--surface:#25253A;--card:#2E2E45;--border:#3A3A55;--text:#E2E2F0;--muted:#8888AA;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
header{position:relative;padding:3rem 2rem 2rem;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:.5rem;}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--flexo),var(--conc),var(--puebla),transparent);}
.eyebrow{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;}
h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:800;line-height:1;background:linear-gradient(135deg,#C084FC,#60A5FA,#4ADE80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header-meta{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-top:.5rem;}
.week-badge{font-family:'DM Mono',monospace;font-size:.8rem;padding:.35rem .9rem;background:var(--card);border:1px solid var(--border);border-radius:999px;color:var(--text);}
.week-badge span{color:#C084FC;font-weight:500}
.topbar{display:flex;justify-content:flex-end;padding:.8rem 2rem;background:var(--surface);border-bottom:1px solid var(--border);}
.airtable-btn{display:inline-flex;align-items:center;gap:.5rem;font-family:'DM Mono',monospace;font-size:.75rem;letter-spacing:.05em;padding:.5rem 1.2rem;border-radius:6px;background:linear-gradient(135deg,#7B2FBE,#1565C0);color:#fff;text-decoration:none;transition:opacity .2s,transform .2s;}
.airtable-btn:hover{opacity:.85;transform:translateY(-1px);}
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 2rem;background:var(--surface);}
.tab{font-family:'DM Mono',monospace;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;padding:1rem 1.5rem;border:none;background:transparent;color:#fff;cursor:pointer;position:relative;transition:color .2s;opacity:.45;}
.tab::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:transparent;transition:background .2s;}
.tab[data-site="Flexo"].active{color:#D8B4FE;opacity:1}.tab[data-site="Flexo"].active::after{background:#7B2FBE}
.tab[data-site="Concentra"].active{color:#93C5FD;opacity:1}.tab[data-site="Concentra"].active::after{background:#1565C0}
.tab[data-site="Puebla"].active{color:#86EFAC;opacity:1}.tab[data-site="Puebla"].active::after{background:#1B5E20}
main{padding:2rem;background:var(--bg);}
.panel{display:none}.panel.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.cob-bar{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;padding:.8rem 1rem;border-radius:10px;background:var(--card);margin-bottom:1.2rem;border:1px solid var(--border);}
.cob-label{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
.cob-tag{font-family:'DM Mono',monospace;font-size:.7rem;padding:.25rem .75rem;border-radius:999px;}
.schedule-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,.25)}
table{border-collapse:collapse;min-width:900px;width:100%}
thead tr th{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;padding:.6rem .4rem;text-align:center;border:1px solid var(--border);position:sticky;top:0;z-index:2;white-space:nowrap;}
.th-name{text-align:left;padding-left:1.2rem;min-width:190px;font-family:'Syne',sans-serif;font-size:.8rem;}
.group-header td{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:.4rem 1.2rem;text-align:left;border-top:1px solid var(--border);color:#fff;}
tbody tr{transition:filter .15s}tbody tr:hover td{filter:brightness(1.08)}
td{padding:.4rem;text-align:center;font-size:.75rem;border:1px solid rgba(0,0,0,.06);height:38px;}
.td-name{text-align:left;padding-left:1.2rem;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.87rem;white-space:nowrap;}
.site-flexo .td-name{color:#3b0764;}
.site-flexo .row-g0 td{background:#E8D5F5}.site-flexo .row-g1 td{background:#D8BDF0}.site-flexo .row-g2 td{background:#C9A8EA}
.site-flexo thead tr th{background:#7B2FBE;color:#fff;}.site-flexo .group-header td{background:#9B4DCA;}
.site-flexo .row-g0 td.cell-break,.site-flexo .row-g1 td.cell-break,.site-flexo .row-g2 td.cell-break{background:#4A0072;color:#fff;}
.site-flexo .row-g0 td.cell-lunch,.site-flexo .row-g1 td.cell-lunch,.site-flexo .row-g2 td.cell-lunch{background:#1B5E20;color:#fff;}
.site-concentra .td-name{color:#0a1628;}
.site-concentra .row-g0 td{background:#BBDEFB}.site-concentra .row-g1 td{background:#90CAF9}.site-concentra .row-g2 td{background:#B3D9F7}
.site-concentra thead tr th{background:#1565C0;color:#fff;}.site-concentra .group-header td{background:#1976D2;}
.site-concentra .row-g0 td.cell-break,.site-concentra .row-g1 td.cell-break,.site-concentra .row-g2 td.cell-break{background:#0D3A7A;color:#fff;}
.site-concentra .row-g0 td.cell-lunch,.site-concentra .row-g1 td.cell-lunch,.site-concentra .row-g2 td.cell-lunch{background:#1B5E20;color:#fff;}
.site-puebla .td-name{color:#0a1f0a;}
.site-puebla .row-g0 td{background:#C8E6C9}.site-puebla .row-g1 td{background:#A5D6A7}.site-puebla .row-g2 td{background:#B2DFDB}
.site-puebla thead tr th{background:#1B5E20;color:#fff;}.site-puebla .group-header td{background:#2E7D32;}
.site-puebla .row-g0 td.cell-break,.site-puebla .row-g1 td.cell-break,.site-puebla .row-g2 td.cell-break{background:#0a3d12;color:#fff;}
.site-puebla .row-g0 td.cell-lunch,.site-puebla .row-g1 td.cell-lunch,.site-puebla .row-g2 td.cell-lunch{background:#1B5E20;color:#fff;}
.cell-break,.cell-lunch{font-family:'DM Mono',monospace;font-size:.65rem;font-weight:600;}
.sat-badge span{color:#4ADE80;font-weight:500}
</style>
</head>
<body>
<header>
  <span class="eyebrow">Sistema de Horarios — Telesales</span>
  <h1>Schedules</h1>
  <div class="header-meta">
    <span class="week-badge">Semana: <span>Week 19</span></span>
    <span class="week-badge">Cobertura Sábado: <span style="color:#4ADE80;font-weight:500">9 de Mayo del 4 al 9 de Mayo</span></span>
  </div>
</header>
<div class="topbar">
  <a href="https://airtable.com/appnUxot5wb7aHIq5/pagbiENTFl1teaE3Q" target="_blank" class="airtable-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    Da clic aquí para subir horarios
  </a>
</div>
<div class="tabs">
  <button class="tab active" data-site="Flexo">Flexo</button>
  <button class="tab" data-site="Concentra">Concentra</button>
  <button class="tab" data-site="Puebla">Puebla</button>
</div>
<main>
  <div class="panel active" id="panel-Flexo"></div>
  <div class="panel" id="panel-Concentra"></div>
  <div class="panel" id="panel-Puebla"></div>
</main>
<div style="padding:.8rem 2rem;border-top:1px solid var(--border);background:var(--surface);font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);">
  Cualquier duda o cambio consulta a tu coordinador.
</div>
<script>
const HORAS=["9:00","10:00","11:00","11:15","11:30","11:45","12:00","13:00","14:00","15:00","16:00","16:15","16:30","17:00","17:45","18:00","19:00"];
const LABELS=["── Lunch 13:00 ──","── Lunch 14:00 ──","── Lunch 15:00 ──"];
const COLORS={Flexo:'#7B2FBE',Concentra:'#1565C0',Puebla:'#1B5E20'};
const LIGHTS={Flexo:'#F3E5FF',Concentra:'#E3F2FD',Puebla:'#E8F5E9'};
const SCHEDULE={"Flexo": {"week": "Week 19", "fecha": "9 de Mayo del 4 al 9 de Mayo", "people": [{"name": "Gerardo Almanza", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Ana Morales", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Jaqui Mendoza", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Erick Duran", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Alexa Hernandez", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Ana Pale", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Axel Palomarez", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}], "cobertura": ["Gerardo Almanza"]}, "Concentra": {"week": "Week 19", "fecha": "9 de Mayo del 4 al 9 de Mayo", "people": [{"name": "Hugo Iker", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Jose Quirino", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Fernando Evaristo", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Zuleima Salazar", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Adan Valencia", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Arturo Barcenas", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Luis Perez", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Carlos Monroy", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "José Ojeda", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Gustavo Huesca", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Bernardo Cruz", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Mariel Salazar", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Gabriela Arguello", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Marina Tomas", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Manuel Ramirez", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Brenda Paniagua", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Ana Ibarra", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Brayan Castillo", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}], "cobertura": ["Hugo Iker", "Jose Quirino", "Fernando Evaristo"]}, "Puebla": {"week": "Week 19", "fecha": "9 de Mayo del 4 al 9 de Mayo", "people": [{"name": "Claudia Rodriguez", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Jaime Hernandez", "group": 0, "b1": "11:15", "lu": "13:00", "b2": "16:30"}, {"name": "Claudia Mejia", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Julio Aparicio", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "David Roldan", "group": 1, "b1": "11:30", "lu": "14:00", "b2": "17:00"}, {"name": "Mafer Martinez", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Alejandra Galindo", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}, {"name": "Luz Gonzalez", "group": 2, "b1": "11:45", "lu": "15:00", "b2": "17:45"}], "cobertura": ["Claudia Rodriguez"]}};
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+tab.dataset.site).classList.add('active');
  });
});
function renderSite(site){
  const {people,cobertura}=SCHEDULE[site];
  const sc='site-'+site.toLowerCase();
  let html='';
  if(cobertura&&cobertura.length>0){
    html+=`<div class="cob-bar"><span class="cob-label">Cobertura Sábado</span>`;
    cobertura.forEach(n=>{html+=`<span class="cob-tag" style="border:1px solid ${COLORS[site]};color:${COLORS[site]};background:${LIGHTS[site]}">${n}</span>`;});
    html+=`</div>`;
  }
  html+=`<div class="schedule-wrap"><table class="${sc}"><thead><tr><th class="th-name">${site}</th>`;
  HORAS.forEach(h=>{html+=`<th>${h}</th>`;});
  html+=`</tr></thead><tbody>`;
  let lastGroup=-1;
  people.forEach(p=>{
    const {name,group,b1,lu,b2}=p;
    if(group!==lastGroup){lastGroup=group;html+=`<tr class="group-header"><td colspan="${HORAS.length+1}">${LABELS[group]}</td></tr>`;}
    html+=`<tr class="row-g${group}"><td class="td-name">${name}</td>`;
    HORAS.forEach(h=>{
      if(h===b1||h===b2) html+=`<td class="cell-break">Break</td>`;
      else if(h===lu)    html+=`<td class="cell-lunch">Lunch</td>`;
      else               html+=`<td></td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;
  document.getElementById('panel-'+site).innerHTML=html;
}
['Flexo','Concentra','Puebla'].forEach(renderSite);
</script>
</body>
</html>
