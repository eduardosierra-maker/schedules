<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Schedules — Flexo · Concentra · Puebla</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --flexo:#9333EA;--flexo-l:#EDE9FE;
  --conc:#2563EB;--conc-l:#DBEAFE;
  --puebla:#16A34A;--puebla-l:#DCFCE7;
  --bg:#1C1C27;
  --surface:#25253A;
  --card:#2E2E45;
  --border:#3A3A55;
  --text:#E2E2F0;
  --muted:#8888AA;
  --lunch-g:#16A34A;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
header{position:relative;padding:3rem 2rem 2rem;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:.5rem;}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--flexo),var(--conc),var(--puebla),transparent);}
.eyebrow{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;}
h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:800;line-height:1;background:linear-gradient(135deg,#C084FC,#60A5FA,#4ADE80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header-meta{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-top:.5rem;}
.week-badge{font-family:'DM Mono',monospace;font-size:.8rem;padding:.35rem .9rem;background:var(--card);border:1px solid var(--border);border-radius:999px;color:var(--text);}
.week-badge span{color:#C084FC;font-weight:500}
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 2rem;background:var(--surface);}
.tab{font-family:'DM Mono',monospace;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;padding:1rem 1.5rem;border:none;background:transparent;color:var(--muted);cursor:pointer;position:relative;transition:color .2s;}
.tab::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:transparent;transition:background .2s;}
.tab[data-site="Flexo"].active{color:#C084FC}.tab[data-site="Flexo"].active::after{background:var(--flexo)}
.tab[data-site="Concentra"].active{color:#93C5FD}.tab[data-site="Concentra"].active::after{background:var(--conc)}
.tab[data-site="Puebla"].active{color:#86EFAC}.tab[data-site="Puebla"].active::after{background:var(--puebla)}
main{padding:2rem;background:var(--bg);}
.panel{display:none}.panel.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.schedule-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,.25)}
table{border-collapse:collapse;min-width:900px;width:100%}
thead tr th{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;padding:.6rem .4rem;text-align:center;border:1px solid var(--border);position:sticky;top:0;z-index:2;white-space:nowrap;}
.th-name{text-align:left;padding-left:1.2rem;min-width:190px;font-family:'Syne',sans-serif;font-size:.8rem;}
.group-header td{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:.4rem 1.2rem;text-align:left;border-top:1px solid var(--border);}
tbody tr{transition:filter .15s}tbody tr:hover td{filter:brightness(1.12)}
td{padding:.4rem;text-align:center;font-size:.75rem;border:1px solid rgba(255,255,255,.05);height:38px;}
.td-name{text-align:left;padding-left:1.2rem;font-family:'DM Sans',sans-serif;font-weight:500;font-size:.87rem;white-space:nowrap;}
.cell-break{background:rgba(255,255,255,.1);color:rgba(255,255,255,.65);font-family:'DM Mono',monospace;font-size:.6rem;font-weight:500;letter-spacing:.05em;}
.cell-lunch-g{background:#15803D;color:#fff;font-family:'DM Mono',monospace;font-size:.6rem;font-weight:500;}
.cell-lunch-b{background:#1D4ED8;color:#fff;font-family:'DM Mono',monospace;font-size:.6rem;font-weight:500;}

/* Flexo */
.site-flexo .td-name{color:#DDD6FE}
.site-flexo .row-g0 td{background:#2A1F3D}.site-flexo .row-g1 td{background:#2E2245}.site-flexo .row-g2 td{background:#32254D}
.site-flexo thead tr th{background:#1E1530;color:#C084FC}.site-flexo .group-header td{background:#3B2A5A;color:#DDD6FE}

/* Concentra */
.site-concentra .td-name{color:#BFDBFE}
.site-concentra .row-g0 td{background:#1A2340}.site-concentra .row-g1 td{background:#1D2748}.site-concentra .row-g2 td{background:#202B50}
.site-concentra thead tr th{background:#131B32;color:#93C5FD}.site-concentra .group-header td{background:#253460;color:#BFDBFE}

/* Puebla */
.site-puebla .td-name{color:#BBF7D0}
.site-puebla .row-g0 td{background:#192B22}.site-puebla .row-g1 td{background:#1C3026}.site-puebla .row-g2 td{background:#1F342A}
.site-puebla thead tr th{background:#121F19;color:#86EFAC}.site-puebla .group-header td{background:#244033;color:#BBF7D0}

.topbar{display:flex;justify-content:flex-end;padding:.8rem 2rem;background:var(--surface);border-bottom:1px solid var(--border);}.airtable-btn{display:inline-flex;align-items:center;gap:.5rem;font-family:"DM Mono",monospace;font-size:.75rem;letter-spacing:.05em;padding:.5rem 1.2rem;border-radius:6px;background:linear-gradient(135deg,#9333EA,#2563EB);color:#fff;text-decoration:none;transition:opacity .2s,transform .2s;}.airtable-btn:hover{opacity:.85;transform:translateY(-1px);}.airtable-btn svg{flex-shrink:0;}.legend{display:flex;gap:1.5rem;flex-wrap:wrap;padding:1rem 2rem;border-top:1px solid var(--border);background:var(--surface);font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted);}
.leg-item{display:flex;align-items:center;gap:.4rem}.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
</style>
</head>
<body>
<header>
  <span class="eyebrow">Sistema de Horarios — Telesales</span>
  <h1>Schedules</h1>
  <div class="header-meta">
    <span class="week-badge">Semana: <span>Week 18</span></span>
    <span class="week-badge">27 Apr – 2 May</span>
  </div>
</header>
<div class="topbar"><a href="https://airtable.com/appnUxot5wb7aHIq5/pagbiENTFl1teaE3Q" target="_blank" class="airtable-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Da clic aquí para subir horarios</a></div><div class="tabs">
  <button class="tab active" data-site="Flexo">Flexo</button>
  <button class="tab" data-site="Concentra">Concentra</button>
  <button class="tab" data-site="Puebla">Puebla</button>
</div>
<main>
  <div class="panel active" id="panel-Flexo"></div>
  <div class="panel" id="panel-Concentra"></div>
  <div class="panel" id="panel-Puebla"></div>
</main>
<div class="legend">
  <span class="leg-item"><span class="leg-dot" style="background:rgba(255,255,255,.15)"></span>Break</span>
  <span class="leg-item"><span class="leg-dot" style="background:#15803D"></span>Lunch 13:00</span>
  <span class="leg-item"><span class="leg-dot" style="background:#1D4ED8"></span>Lunch 14:00 / 15:00</span>
  <span class="leg-item"><span class="leg-dot" style="background:transparent;border:1px solid #555"></span>Working</span>
</div>
<script>
const HORAS=["9:00","10:00","11:00","11:15","11:30","11:45","12:00","13:00","14:00","15:00","16:00","16:15","16:30","17:00","17:45","18:00","19:00"];
const LABELS=["── Lunch 13:00 ──","── Lunch 14:00 ──","── Lunch 15:00 ──"];
const COLORS={Flexo:'#9333EA',Concentra:'#2563EB',Puebla:'#16A34A'};
const LIGHTS={Flexo:'#EDE9FE',Concentra:'#DBEAFE',Puebla:'#DCFCE7'};
const SCHEDULE={"Flexo":{"week":"Week 18","fecha":"2 de Mayo del 27 al 2 de Mayo","people":[{"name":"Erick Duran","group":0,"b1":"11:15","lu":"13:00","b2":"16:30"},{"name":"Gerardo Almanza","group":0,"b1":"11:15","lu":"13:00","b2":"16:30"},{"name":"Axel Palomarez","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Irving Gaucin","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Alexa Hernandez","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Ana Pale","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"},{"name":"Jaqui Mendoza","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"},{"name":"Ana Morales","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"}],"cobertura":[]},"Concentra":{"week":"Week 18","fecha":"2 de Mayo del 27 al 2 de Mayo","people":[{"name":"Ana Ibarra","group":0,"b1":"11:15","lu":"13:00","b2":"16:30"},{"name":"Zuleima Salazar","group":0,"b1":"11:15","lu":"13:00","b2":"16:30"},{"name":"Fernando Evaristo","group":0,"b1":"11:15","lu":"13:00","b2":"16:30"},{"name":"Mariel Salazar","group":0,"b1":"11:15","lu":"13:00","b2":"16:30"},{"name":"Gabriela Arguello","group":0,"b1":"11:15","lu":"13:00","b2":"16:30"},{"name":"Carla Velazquez","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Marina Tomas","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Brenda Paniagua","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Manuel Ramirez","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Luis Perez","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Jose Quirino","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"José Ojeda","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Adan Valencia","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"},{"name":"Arturo Barcenas","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"},{"name":"Gustavo Huesca","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"},{"name":"Hugo Iker","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"},{"name":"Bernardo Cruz","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"},{"name":"Brayan Castillo","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"},{"name":"Carlos Monroy","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"}],"cobertura":[]},"Puebla":{"week":"Week 18","fecha":"2 de Mayo del 27 al 2 de Mayo","people":[{"name":"Claudia Mejia","group":0,"b1":"11:15","lu":"13:00","b2":"16:30"},{"name":"David Roldan","group":0,"b1":"11:15","lu":"13:00","b2":"16:30"},{"name":"Luz Gonzalez","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Mafer Martinez","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Alejandra Galindo","group":1,"b1":"11:30","lu":"14:00","b2":"17:00"},{"name":"Julio Aparicio","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"},{"name":"Jaime Hernandez","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"},{"name":"Claudia Rodriguez","group":2,"b1":"11:45","lu":"15:00","b2":"17:45"}],"cobertura":[]}};
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+tab.dataset.site).classList.add('active');
  });
});
function renderSite(site){
  const {people,cobertura}=SCHEDULE[site];
  const sc='site-'+site.toLowerCase();
  let html=`<div class="schedule-wrap"><table class="${sc}"><thead><tr><th class="th-name">${site}</th>`;
  HORAS.forEach(h=>{html+=`<th>${h}</th>`;});
  html+=`</tr></thead><tbody>`;
  let lastGroup=-1;
  people.forEach(({name,group,b1,lu,b2})=>{
    if(group!==lastGroup){lastGroup=group;html+=`<tr class="group-header"><td colspan="${HORAS.length+1}">${LABELS[group]}</td></tr>`;}
    html+=`<tr class="row-g${group}"><td class="td-name">${name}</td>`;
    HORAS.forEach(h=>{
      if(h===b1||h===b2) html+=`<td class="cell-break">BRK</td>`;
      else if(h===lu)    html+=`<td class="${group===0?'cell-lunch-g':'cell-lunch-b'}">LCH</td>`;
      else               html+=`<td></td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;
  if(cobertura&&cobertura.length>0){
    html+=`<div style="margin-top:2rem;padding:1.5rem;border:1px solid var(--border);border-radius:12px;background:var(--card)"><p style="font-family:'Syne',sans-serif;margin-bottom:1rem;opacity:.7">Cobertura Sábado</p><div style="display:flex;flex-wrap:wrap;gap:.5rem">`;
    cobertura.forEach(n=>{html+=`<span style="font-family:'DM Mono',monospace;font-size:.72rem;padding:.3rem .8rem;border-radius:999px;border:1px solid ${COLORS[site]};color:${LIGHTS[site]};background:${COLORS[site]}33">${n}</span>`;});
    html+=`</div></div>`;
  }
  document.getElementById('panel-'+site).innerHTML=html;
}
['Flexo','Concentra','Puebla'].forEach(renderSite);
</script>
</body>
</html>
